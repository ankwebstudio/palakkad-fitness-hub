<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palakkad Fitness Hub - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body{
    background: linear-gradient(rgba(0,0,0,.8),rgba(0,0,0,.8)),
    url('img/gallery/gallery1.jpg');
    background-size: cover;
    background-position: center;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Poppins', sans-serif;
}

.auth-card{
    background:#111;
    border-radius:20px;
    padding:40px;
    width:100%;
    max-width:500px;
    box-shadow:0 0 30px rgba(255,102,0,.3);
}

.logo{
    color:#14B8A6;
    font-size:45px;
    margin-bottom:10px;
}

h2{
    color:#fff;
    font-weight:700;
}

.nav-pills .nav-link{
    color:#fff;
    border-radius:50px;
}

.nav-pills .nav-link.active{
    background:#14B8A6;
}

.form-control{
    background:#222;
    border:none;
    color:#fff;
    padding:12px;
}

.form-control:focus{
    background:#222;
    color:#fff;
    box-shadow:none;
    border:1px solid #14B8A6;
}

.btn-fitness{
    background:#14B8A6;
    color:#fff;
    border:none;
    padding:12px;
    font-weight:600;
    transition:.3s;
}

.btn-fitness:hover{
    background:#0F9F90;
}

.text-link{
    color:#14B8A6;
    text-decoration:none;
}
.form-control::placeholder{
    color: #bdbdbd !important;
    opacity: 1;
}

.form-control::-webkit-input-placeholder{
    color: #bdbdbd;
}

.form-control::-moz-placeholder{
    color: #bdbdbd;
}

.form-control:-ms-input-placeholder{
    color: #bdbdbd;
}
.back-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    color:#14B8A6;
    text-decoration:none;
    font-size:15px;
    font-weight:600;
    margin-bottom:20px;
    transition:0.3s;
}

.back-btn:hover{
    color:#fff;
}

.back-btn i{
    font-size:14px;
}
</style>
</head>
<body>

<div class="auth-card">
    <a href="index.html" class="back-btn">
    <i class="fas fa-arrow-left"></i> Back
</a>

    <div class="text-center mb-4">
        <i class="fas fa-dumbbell logo"></i>
        <h2>Palakkad Fitness Hub</h2>
        <p class="text-light">Train Hard. Stay Strong.</p>
    </div>

    <ul class="nav nav-pills nav-justified mb-4" id="authTab">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#login">
                Sign In
            </button>
        </li>

        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#register">
                Sign Up
            </button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- Login -->
        <div class="tab-pane fade show active" id="login">

            <form>
                <div class="mb-3">
                    <input type="email" class="form-control" placeholder="Email Address">
                </div>

                <div class="mb-3">
                    <input type="password" class="form-control" placeholder="Password">
                </div>

                <button class="btn btn-fitness w-100">
                    Sign In
                </button>

                <div class="text-center mt-3">
                    <a href="#" class="text-link">Forgot Password?</a>
                </div>
            </form>

        </div>

        <!-- Register -->
        <div class="tab-pane fade" id="register">

            <form>
                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Full Name">
                </div>

                <div class="mb-3">
                    <input type="email" class="form-control" placeholder="Email Address">
                </div>

                <div class="mb-3">
                    <input type="tel" class="form-control" placeholder="Phone Number">
                </div>

                <div class="mb-3">
                    <input type="password" class="form-control" placeholder="Password">
                </div>

                <div class="mb-3">
                    <input type="password" class="form-control" placeholder="Confirm Password">
                </div>

                <button class="btn btn-fitness w-100">
                    Create Account
                </button>
            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
